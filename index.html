<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConference</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- Navbar Start -->
    <nav class="navbar">

        <!-- Logo -->
        <div class="navbar-logo">
            <a href="#" class="logo">
                <img src="./assets/logo-mini.png" alt="DevConference Logo">
                <h2 class="logo-text">
                    DEVCONF <span class="logo-year">2026</span>
                </h2>
            </a>
        </div>

        <!-- Menu -->
        <div class="navbar-menu">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link">Speakers</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link font-arimo">Schedule</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link font-arimo">
                        <span class="text-medium">Tracks</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link font-arimo">
                        <span class="text-medium">Venue</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link font-arimo">
                        <span class="text-medium">Blog</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Button -->
        <div class="navbar-action">
            <button class="btn btn-primary">Register Now</button>
        </div>
    </nav>
    <!-- Navbar End -->


    <!-- Banner section start -->
    <header class="banner">

        <!-- Hero Content -->
        <div class="banner-content">
            <h1 class="banner-title">
                Code. <span class="highlight">Connect.</span> Create
            </h1>
            <p class="banner-description">
                Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three days of
                cutting-edge talks, hands-on workshops, and meaningful connections.
            </p>
        </div>

        <!-- Hero Action -->
        <div class="banner-action">
            <button class="btn btn-primary">
                Register Now
            </button>
        </div>

    </header>
    <!-- Banner section end -->

</body>

</html>
